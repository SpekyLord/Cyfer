<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="icon" href="cyfer_logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
<a href="#main" class="skip-link">Skip to main content</a>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="verify.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel" data-presets="react">
/* CYFER — App shell + router.  Routes are hash-based so refresh works in-preview. */

const DEMO_DOCS = [
  {
    id: 'ord-2026-014',
    title: 'Ordinance 2026-014 — Tricycle Fare Adjustment',
    description: 'Raises minimum tricycle fare citywide from ₱12 to ₱15, effective May 2026, while preserving student/senior discounts.',
    category: 'ordinance',
    published: 'Apr 13, 2026',
    approvers: 3,
    block: 1417,
    // SHA-256 of the demo "authentic" sample file
    hash: null,
  },
  {
    id: 'bud-2026-q1',
    title: 'FY 2026 Q1 Budget Disbursements',
    description: 'Quarterly disbursement report covering infrastructure, education, and social services. Includes line-item breakdown.',
    category: 'budget',
    published: 'Apr 05, 2026',
    approvers: 3, block: 1402,
    hash: 'c4a1b2a6f5e78db3b0c5d1a2b3c4d5e67890abcdef1234567890abcdef123456'
  },
  {
    id: 'res-2026-009',
    title: 'Resolution R-2026-009 — Flood Control Task Force',
    description: 'Establishes an inter-department task force to review flood-prone barangays ahead of the rainy season.',
    category: 'resolution',
    published: 'Mar 28, 2026',
    approvers: 3, block: 1388,
    hash: 'a9b8c7d6e5f4332211ccbbaa99887766554433221100ffeeddccbbaa99887766'
  },
  {
    id: 'con-2026-003',
    title: 'Contract 2026-003 — Streetlight Maintenance',
    description: 'Three-year service agreement for LED streetlight maintenance across 14 barangays. Competitively bid.',
    category: 'contract',
    published: 'Mar 18, 2026',
    approvers: 3, block: 1360,
    hash: '11223344556677889900aabbccddeeff11223344556677889900aabbccddeeff'
  },
  {
    id: 'per-2026-014',
    title: 'Permit Batch 2026-014 — Sidewalk Vending',
    description: 'Approved list of sidewalk vending permits for Q2 2026, with location maps and operating hours.',
    category: 'permit',
    published: 'Mar 12, 2026',
    approvers: 3, block: 1321,
    hash: 'ffeeddccbbaa99887766554433221100ffeeddccbbaa99887766554433221100'
  },
  {
    id: 'ord-2026-012',
    title: 'Ordinance 2026-012 — Plastic Bag Reduction',
    description: 'Bans single-use plastic bags in all public markets, phases in paper and reusable alternatives over six months.',
    category: 'ordinance',
    published: 'Feb 26, 2026',
    approvers: 3, block: 1244,
    hash: '0a1b2c3d4e5f60718293a4b5c6d7e8f9a0b1c2d3e4f5061728394a5b6c7d8e9f'
  },
];

/* Hash the "authentic" demo file so the Verify page can match it for real. */
async function computeDemoHash() {
  const content = 'Ordinance 2026-014 — Regulating Tricycle Fare Adjustments\nSection 1...';
  const buf = new TextEncoder().encode(content);
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function App() {
  const { useState, useEffect, useCallback } = React;
  const [route, setRoute] = useState(() => {
    try {
      const saved = localStorage.getItem('cyfer.route');
      if (saved) return JSON.parse(saved);
    } catch (e) {}
    return { name: 'home', params: {} };
  });
  const [docs, setDocs] = useState(DEMO_DOCS);

  // Compute real SHA-256 for the authentic demo doc on load
  useEffect(() => {
    computeDemoHash().then(h => {
      setDocs(prev => prev.map(d => d.id === 'ord-2026-014' ? { ...d, hash: h } : d));
    });
  }, []);

  const nav = useCallback((name, params = {}) => {
    const r = { name, params };
    setRoute(r);
    try { localStorage.setItem('cyfer.route', JSON.stringify(r)); } catch (e) {}
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, []);

  // Pages
  const page = (() => {
    switch (route.name) {
      case 'home':       return <HomePage nav={nav} />;
      case 'verify':     return <VerifyPage nav={nav} demoHashes={docs.filter(d => d.hash)} />;
      case 'documents':  return <DocumentsPage nav={nav} docs={docs} />;
      case 'document': {
        const doc = docs.find(d => d.id === route.params.id) || docs[0];
        return <DocumentDetailPage nav={nav} doc={doc} />;
      }
      case 'budget':     return <BudgetPage nav={nav} />;
      case 'blockchain': return <BlockchainPage nav={nav} />;
      case 'audit':      return <AuditPage nav={nav} />;
      case 'admin':      return <AdminPage nav={nav} />;
      default:           return <HomePage nav={nav} />;
    }
  })();

  const isAdmin = route.name === 'admin';

  return (
    <React.Fragment>
      {!isAdmin && <Topbar route={route.name} nav={nav} />}
      {page}
      {!isAdmin && <Footer />}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
